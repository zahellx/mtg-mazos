<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <link rel="manifest" href="manifest-deckbuilder.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-db-192.png" />
  <title>Deck Builder</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="h-row">
      <button id="backBtn" class="back-btn hidden">‹ Volver</button>
      <h1 id="title">🛠️ Deck Builder</h1>
    </div>
    <div class="meta" id="syncMeta"></div>
  </header>

  <main>
    <!-- Inicio: menú de reportes -->
    <section id="dbHome">
      <div class="collection-bar">
        <div class="title">📦 Mi colección (ManaBox)</div>
        <div id="collectionStatus" class="meta" style="margin-bottom:10px;"></div>
        <button class="btn" id="importBtn">Importar colección (CSV de ManaBox)</button>
        <input type="file" id="csvInput" accept=".csv,text/csv" class="hidden" />
      </div>

      <a class="btn secondary" href="index.html" style="text-decoration:none; margin-bottom:16px;">🗂️ Ir a Mis Mazos</a>

      <div class="report-menu" id="reportMenu"></div>
    </section>

    <!-- Cartas vendibles -->
    <section id="vendiblesView" class="hidden">
      <div class="collection-bar">
        <div id="vendiblesStatus" class="meta"></div>
      </div>
      <div class="filters">
        <input type="search" id="vendiblesSearch" placeholder="Buscar carta..." />
        <button class="btn secondary" id="vendiblesPrices" style="width:auto; white-space:nowrap;">💶 Precios</button>
      </div>
      <div id="vendiblesList"></div>
    </section>

    <!-- Conflictos de copias -->
    <section id="conflictosView" class="hidden">
      <div class="collection-bar"><div id="conflictosStatus" class="meta"></div></div>
      <div class="filters">
        <input type="search" id="conflictosSearch" placeholder="Buscar carta..." />
        <label class="toggle"><input type="checkbox" id="conflictosBasics" /> Básicas</label>
      </div>
      <div id="conflictosList"></div>
    </section>

    <!-- Lista Cardmarket -->
    <section id="cardmarketView" class="hidden">
      <div class="collection-bar"><div id="cmStatus" class="meta"></div></div>
      <div class="cm-actions">
        <button class="btn" id="cmCopy">📋 Copiar lista entera</button>
        <button class="btn secondary" id="cmClear" style="width:auto; white-space:nowrap;">🗑️ Limpiar</button>
      </div>
      <div id="cardmarketList"></div>
    </section>

    <!-- Lista de pedidas -->
    <section id="pedidasView" class="hidden">
      <div class="collection-bar"><div id="pedStatus" class="meta"></div></div>
      <div class="cm-actions">
        <button class="btn secondary" id="pedImport" style="width:auto; white-space:nowrap;">📥 Pegar pedido</button>
        <button class="btn" id="pedCopy">📋 Copiar</button>
        <button class="btn secondary" id="pedClear" style="width:auto; white-space:nowrap;">🗑️ Limpiar</button>
      </div>
      <div id="pedImportBox" class="collection-bar hidden">
        <div class="title">Pega aquí el pedido de Cardmarket (tal cual, con nombres en inglés)</div>
        <textarea id="pedImportText" rows="6" placeholder="1x  Contrahechizo&#10;Counterspell&#10;#50&#10;NM&#10;1,49 €&#10;..." style="width:100%; background:#0f1115; border:1px solid #2a2f3a; color:#e8eaed; border-radius:9px; padding:10px; font-size:13px; margin:8px 0;"></textarea>
        <button class="btn" id="pedImportGo">Marcar como pedidas</button>
      </div>
      <div id="pedidasList"></div>
    </section>

    <!-- Configuración de mazos -->
    <section id="configView" class="hidden">
      <div class="collection-bar"><div id="cfgStatus" class="meta"></div></div>
      <div id="configBody"></div>
    </section>

    <!-- Info / oracle de mazo -->
    <section id="infoView" class="hidden">
      <div class="filters">
        <select id="infoDeckSelect" style="flex:1; background:var(--panel); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:9px 12px; font-size:14px;"></select>
      </div>
      <div class="filters">
        <input type="search" id="infoSearch" placeholder="Buscar carta..." />
      </div>
      <div id="infoList"></div>
    </section>
  </main>

  <script src="sync.js"></script>
  <script src="deck-builder.js"></script>
</body>
</html>
