<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Mis Mazos MTG</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b22;
      --panel-2: #20242d;
      --border: #2a2f3a;
      --text: #e8eaed;
      --muted: #9aa1ad;
      --accent: #6c8cff;
      --warn: #ffb454;
      --bad: #ff6b6b;
      --ok: #3ecf8e;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: env(safe-area-inset-bottom);
    }
    header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(15,17,21,.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px calc(14px + env(safe-area-inset-top));
      padding-top: max(14px, env(safe-area-inset-top));
    }
    .h-row { display: flex; align-items: center; gap: 10px; }
    h1 { font-size: 18px; margin: 0; font-weight: 700; flex: 1; }
    .back-btn {
      background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: 7px 12px; font-size: 14px; cursor: pointer;
    }
    main { padding: 14px 16px 40px; max-width: 820px; margin: 0 auto; }
    .meta { color: var(--muted); font-size: 12.5px; margin-top: 4px; }

    .collection-bar {
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px; margin-bottom: 16px;
    }
    .collection-bar .title { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px; justify-content: center;
      background: var(--accent); color: #0b0e14; border: none; border-radius: 11px;
      padding: 11px 14px; font-size: 14.5px; font-weight: 600; cursor: pointer; width: 100%;
    }
    .btn.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); font-weight: 500; }
    .pill { font-size: 12px; padding: 3px 9px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--border); color: var(--muted); }
    .pill.ok { color: var(--ok); border-color: #1f4d3a; }
    .pill.warn { color: var(--warn); border-color: #5a4520; }

    /* Lista de mazos */
    .deck-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 560px) { .deck-grid { grid-template-columns: 1fr 1fr; } }
    .deck-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px; cursor: pointer; display: flex; align-items: center; gap: 12px;
      transition: border-color .15s, transform .05s;
    }
    .deck-card:active { transform: scale(.99); }
    .deck-card .info { flex: 1; min-width: 0; }
    .deck-card .name { font-weight: 600; font-size: 15.5px; }
    .deck-card .sub { color: var(--muted); font-size: 12.5px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge {
      flex-shrink: 0; min-width: 38px; text-align: center; border-radius: 10px;
      padding: 6px 9px; font-weight: 700; font-size: 15px;
    }
    .badge.zero { background: #16291f; color: var(--ok); }
    .badge.some { background: #3a2a14; color: var(--warn); }

    /* Detalle de mazo: lista de conflictos */
    .conflict {
      display: flex; gap: 12px; padding: 11px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 13px; margin-bottom: 10px; align-items: center;
    }
    .conflict img {
      width: 54px; height: 75px; border-radius: 6px; object-fit: cover; background: var(--panel-2);
      flex-shrink: 0;
    }
    .conflict .c-info { flex: 1; min-width: 0; }
    .conflict .c-name { font-weight: 600; font-size: 14.5px; }
    .conflict .c-counts { font-size: 12.5px; margin-top: 3px; }
    .conflict .c-counts .have { color: var(--ok); font-weight: 600; }
    .conflict .c-counts .need { color: var(--bad); font-weight: 600; }
    .conflict .loc { color: var(--muted); font-weight: 600; }
    .conflict .loc.bad { color: var(--bad); }
    .conflict .loc.warn { color: var(--warn); }
    .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .chip {
      font-size: 11.5px; padding: 3px 8px; border-radius: 999px;
      background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    }
    .empty { text-align: center; color: var(--muted); padding: 50px 20px; }
    .empty .big { font-size: 40px; margin-bottom: 12px; }
    .filters { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
    .filters input[type="search"] {
      flex: 1; background: var(--panel); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: 9px 12px; font-size: 14px;
    }
    .toggle { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--muted); white-space: nowrap; }
    .hidden { display: none !important; }
    a { color: var(--accent); }
    .note { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 6px; }
  </style>
</head>
<body>
  <header>
    <div class="h-row">
      <button id="backBtn" class="back-btn hidden">‹ Mazos</button>
      <h1 id="title">Mis Mazos MTG</h1>
    </div>
    <div class="meta" id="syncMeta"></div>
  </header>

  <main>
    <!-- Vista de inicio -->
    <section id="homeView">
      <div class="collection-bar">
        <div class="title">📦 Mi colección (ManaBox)</div>
        <div id="collectionStatus" class="meta" style="margin-bottom:10px;">Sin colección importada todavía.</div>
        <button class="btn" id="importBtn">Importar colección (CSV de ManaBox)</button>
        <input type="file" id="csvInput" accept=".csv,text/csv" class="hidden" />
        <p class="note">En ManaBox: <b>Ajustes → Exportar colección → CSV</b>, compártelo a este móvil y elígelo aquí. Se guarda solo en este dispositivo.</p>
      </div>

      <div class="filters">
        <input type="search" id="deckSearch" placeholder="Buscar mazo..." />
      </div>
      <div class="deck-grid" id="deckGrid"></div>
    </section>

    <!-- Vista de detalle de mazo -->
    <section id="deckView" class="hidden">
      <div class="filters">
        <input type="search" id="cardSearch" placeholder="Buscar carta..." />
        <label class="toggle"><input type="checkbox" id="basicsToggle" /> Tierras básicas</label>
      </div>
      <div id="conflictList"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
