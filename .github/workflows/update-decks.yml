name: Actualizar mazos y publicar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy3.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Descargar mazos de Archidekt
        run: node fetch-decks.js

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      # El despliegue de Pages falla de forma intermitente ("Deployment failed,
      # try again later"). Reintentamos hasta 3 veces en la misma ejecución.
      - name: Desplegar (intento 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Esperar antes de reintentar
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20

      - name: Desplegar (intento 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Esperar antes de reintentar
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 30

      - name: Desplegar (intento 3)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
