name: Actualizar mazos y publicar

on:
  # Botón "Run workflow" (también desde la app de GitHub en el móvil)
  workflow_dispatch:
  # Automático: cada día a las 06:00 UTC
  schedule:
    - cron: "0 6 * * *"
  # Al hacer push a la app
  push:
    branches: [main]

permissions:
  contents: write   # para empujar la rama gh-pages

concurrency:
  group: "deploy-gh-pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Descargar mazos de Archidekt
        run: node fetch-decks.js

      - name: Publicar en la rama gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tmp="$(mktemp -d)"
          # Copia el sitio (incluye data/decks-data.json recién generado); excluye control de versiones y basura.
          rsync -a --exclude='.git' --exclude='node_modules' ./ "$tmp/"
          touch "$tmp/.nojekyll"   # servir los ficheros tal cual, sin procesar con Jekyll
          cd "$tmp"
          git init -q
          git checkout -q -b gh-pages
          git add -A
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -q -m "deploy $(date -u +%FT%TZ)"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
