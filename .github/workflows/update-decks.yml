name: Actualizar mazos y publicar

on:
  # Botón "Run workflow" (también desde la app de GitHub en el móvil)
  workflow_dispatch:
  # Automático: cada día a las 06:00 UTC
  schedule:
    - cron: "0 6 * * *"
  # Al hacer push a la app
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues solapados
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Descargar mazos de Archidekt
        run: node fetch-decks.js

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto (sitio estático)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
