name: Actualizar mazos y publicar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy3.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Descargar mazos de Archidekt
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}   # para leer decks-config.json del repo privado
        run: node fetch-decks.js

      # En cron/dispatch, solo desplegamos si los mazos realmente cambiaron en
      # Archidekt (comparando con lo ya publicado, ignorando generatedAt).
      # En push siempre se despliega (puede haber cambios de código).
      - name: Comprobar si hay cambios en los mazos
        id: diff
        run: |
          curl -s "https://zahellx.github.io/${GITHUB_REPOSITORY#*/}/data/decks-data.json" -o /tmp/live.json || echo '{}' > /tmp/live.json
          node -e "
            const fs = require('fs');
            const strip = (p) => { try { const o = JSON.parse(fs.readFileSync(p, 'utf8')); delete o.generatedAt; return JSON.stringify(o); } catch { return ''; } };
            const changed = strip('data/decks-data.json') !== strip('/tmp/live.json');
            console.log('changed =', changed);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'changed=' + changed + '\n');
          "

      - name: Configurar Pages
        if: github.event_name == 'push' || steps.diff.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        if: github.event_name == 'push' || steps.diff.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      # El despliegue de Pages falla de forma intermitente ("Deployment failed,
      # try again later"). Reintentamos hasta 3 veces en la misma ejecución.
      - name: Desplegar (intento 1)
        id: deploy1
        if: github.event_name == 'push' || steps.diff.outputs.changed == 'true'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Esperar antes de reintentar
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20

      - name: Desplegar (intento 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Esperar antes de reintentar
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 30

      - name: Desplegar (intento 3)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
